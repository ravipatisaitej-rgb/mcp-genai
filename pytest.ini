[pytest]
# Pytest configuration for MCP-GenAI project

# Test discovery patterns
python_files = test_*.py conftest.py
python_classes = Test*
python_functions = test_*

# Markers for categorizing tests
markers =
    integration: integration tests that test multiple components together
    slow: slow running tests that should be run selectively
    mock_api: tests that mock external API calls
    unit: unit tests for individual components

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Coverage options (if coverage package is installed)
# --cov=tools --cov=services --cov=utils --cov-report=html

# Test paths
testpaths = tests

# Timeout for tests (requires pytest-timeout)
# timeout = 30

# Logging
log_cli = false
log_cli_level = INFO
log_file = test_run.log
log_file_level = DEBUG

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Minimum Python version
minversion = 7.0
